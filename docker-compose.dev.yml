x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: lifestats
      POSTGRES_USER: lifestats
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - lifestats_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifestats -d lifestats"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - lifestats_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://lifestats:${POSTGRES_PASSWORD}@db:5432/lifestats
      REDIS_URL: redis://redis:6379/0
    command: ["celery", "-A", "src.modules.google_health.tasks:celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://lifestats:${POSTGRES_PASSWORD}@db:5432/lifestats
      REDIS_URL: redis://redis:6379/0
    command: ["celery", "-A", "src.modules.google_health.tasks:celery_app", "beat", "--loglevel=INFO"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  lifestats_db:
  lifestats_redis:
