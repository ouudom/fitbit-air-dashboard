x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: lifestats
      POSTGRES_USER: lifestats
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - lifestats_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifestats -d lifestats"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - lifestats_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://lifestats:${POSTGRES_PASSWORD}@db:5432/lifestats
      REDIS_URL: redis://redis:6379/0
    command: ["sh", "-c", "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

  mcp:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://lifestats:${POSTGRES_PASSWORD}@db:5432/lifestats
      REDIS_URL: redis://redis:6379/0
    command: ["uvicorn", "src.mcp_server:app", "--host", "0.0.0.0", "--port", "8001", "--no-access-log"]
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://lifestats:${POSTGRES_PASSWORD}@db:5432/lifestats
      REDIS_URL: redis://redis:6379/0
    command: ["celery", "-A", "src.modules.google_health.tasks:celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    depends_on:
      api:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://lifestats:${POSTGRES_PASSWORD}@db:5432/lifestats
      REDIS_URL: redis://redis:6379/0
    command: ["celery", "-A", "src.modules.google_health.tasks:celery_app", "beat", "--loglevel=INFO"]
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

  proxy:
    image: caddy:2-alpine
    logging: *default-logging
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
      - mcp
      - web

volumes:
  lifestats_db:
  lifestats_redis:
